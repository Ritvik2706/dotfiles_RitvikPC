# ===== Fonts =====
font_family      0xProto Nerd Font
font_size        16.0
bold_font        0xProto Nerd Font:style=Bold
italic_font      0xProto Nerd Font:style=Italic
bold_italic_font 0xProto Nerd Font:style=Bold Italic
# If your 0xProto build doesn't ship Bold Italic, try:
# bold_font        0xProto Nerd Font:style=Semibold
# bold_italic_font 0xProto Nerd Font:style=Semibold Italic

# ===== Performance =====
# Repaint delay in ms — lower = higher effective frame rate (8ms ≈ 120fps cap)
repaint_delay 8
# Input delay in ms — 0 gives the lowest possible input latency
input_delay 0
# Don't wait for monitor vsync; avoids micro-stutter on Intel iGPU
sync_to_monitor no
# Cursor blink causes a full redraw every blink interval; disable it
cursor_blink_interval 0
# Batch resize events to avoid thrashing the GPU during window resize
resize_debounce_time 0.05
# Use legacy text composition — significantly lighter on Intel iGPU shader load,
# avoids throttling on the fanless i5-8210Y
text_composition_strategy legacy
# No need to poll for updates
update_check_interval 0
# Disable Input Method Editor — reduces Wayland protocol overhead
wayland_enable_ime no

# ===== Window / behavior =====
background_opacity 0.89
# background_blur is not supported by Sway/wlroots — removed to avoid noop overhead
confirm_os_window_close 0
linux_display_server wayland
scrollback_lines 5000
wheel_scroll_min_lines 1
enable_audio_bell no
window_padding_width 4

# ===== Eldritch colorscheme (matches Ghostty theme) =====
foreground           #ebfafa
background           #070a0e
cursor               #f94dff
cursor_text_color    #070a0e

selection_foreground none
selection_background none

# black
color0  #070a0e
color8  #646477
# red
color1  #f16c75
color9  #f16c75
# green
color2  #37f499
color10 #37f499
# yellow
color3  #f7c67f
color11 #f7c67f
# blue
color4  #7081d0
color12 #7081d0
# magenta/purple
color5  #fca6ff
color13 #fca6ff
# cyan
color6  #04d1f9
color14 #04d1f9
# white/gray
color7  #b7bfce
color15 #ebfafa

# Attach to existing tmux session or create one (mirrors Ghostty behaviour)
shell zsh --login -c "if command -v tmux >/dev/null 2>&1; then tmux attach || tmux; else zsh; fi"
